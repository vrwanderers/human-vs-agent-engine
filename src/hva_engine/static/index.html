<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Human VS Agent · Engine Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#090b10;--panel:#111622;--line:#25304a;--ink:#eef4ff;--muted:#8da0bd;--cyan:#58e6d9;--red:#ff5c7a}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 0,#17243c 0,transparent 36%),var(--bg);color:var(--ink);font:15px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace}
    main{max-width:1180px;margin:auto;padding:34px 22px}.eyebrow{color:var(--cyan);letter-spacing:.18em;text-transform:uppercase}h1{font-size:clamp(28px,5vw,58px);margin:.2em 0}.grid{display:grid;grid-template-columns:1fr 1.5fr;gap:16px}.panel{background:#111622dc;border:1px solid var(--line);padding:18px;box-shadow:0 18px 60px #0008}label{display:block;color:var(--muted);margin:12px 0 5px}select,input,button{font:inherit;color:var(--ink);background:#0c111b;border:1px solid var(--line);padding:10px 12px}select,input{width:100%}button{cursor:pointer}button:hover{border-color:var(--cyan);color:var(--cyan)}#actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.metric{display:grid;grid-template-columns:180px 1fr 48px;align-items:center;gap:8px;margin:8px 0}.bar{height:8px;background:#202a3d}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--cyan))}pre{white-space:pre-wrap;max-height:420px;overflow:auto;color:#bcd0ed}small{color:var(--muted)}@media(max-width:760px){.grid{grid-template-columns:1fr}.metric{grid-template-columns:130px 1fr 42px}}
  </style>
</head>
<body><main>
  <div class="eyebrow">Evaluation-first strategy runtime</div><h1>Human <span style="color:var(--red)">VS</span> Agent</h1>
  <div class="grid">
    <section class="panel"><h2>控制台</h2><label>MOD</label><select id="mod" onchange="updateModes()"></select><label>模式</label><select id="mode"></select><label>玩家</label><input id="name" value="Human"><button style="margin-top:14px" onclick="createMatch()">创建对局</button><p id="status"><small>等待创建对局</small></p><div id="actions"></div><h3>五维评价</h3><div id="metrics"></div></section>
    <section class="panel"><h2>状态 / 事件</h2><pre id="state">{}</pre></section>
  </div>
  <p><small>弹幕调试：POST /api/live/danmaku · 实时状态：WS /ws/matches/{id} · OpenAPI：/docs</small></p>
</main><script>
let match=null,allMods=[];
const q=s=>document.querySelector(s);
async function api(path,options){const r=await fetch(path,options);const data=await r.json();if(!r.ok)throw Error(data.detail||r.statusText);return data}
async function init(){allMods=await api('/api/mods');q('#mod').innerHTML=allMods.map(m=>`<option value="${m.id}">${m.name} · ${m.description}</option>`).join('');updateModes()}
function updateModes(){const mod=allMods.find(m=>m.id===q('#mod').value);q('#mode').innerHTML=(mod?.supported_modes||[]).map(x=>`<option value="${x}">${x}</option>`).join('')}
async function createMatch(){try{match=await api('/api/matches',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({mod_id:q('#mod').value,mode:q('#mode').value,human_name:q('#name').value})});render();await metrics()}catch(e){alert(e.message)}}
async function act(index){const action=match.legal_actions[index];match=await api(`/api/matches/${match.id}/actions`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({actor_id:match.human_player_id,action})});render();await metrics()}
function render(){q('#status').innerHTML=`<b>${match.status}</b> · ${match.mode} · ${match.id.slice(0,8)} · current ${match.current_player_id||'—'}`;q('#actions').innerHTML=match.legal_actions.map((a,i)=>`<button onclick="act(${i})">${a.type} ${Object.values(a.payload).join(' ')}</button>`).join('');q('#state').textContent=JSON.stringify({state:match.state,scores:match.scores,agent_summaries:match.agent_summaries,recent_events:match.events.slice(-8)},null,2)}
async function metrics(){const e=await api(`/api/matches/${match.id}/evaluation`);const bars=o=>Object.entries(o).filter(([,v])=>v!==null).map(([k,v])=>`<div class="metric"><span>${k}</span><span class="bar"><i style="width:${v*100}%"></i></span><b>${v.toFixed(2)}</b></div>`).join('');q('#metrics').innerHTML=bars(e.dimensions)+`<p>COMPOSITE <b style="color:var(--cyan)">${e.composite_score.toFixed(3)}</b></p><h4>AI 能力明细</h4>`+bars(e.ai_capability_profile)}
init();
</script></body></html>
