services:
  engine:
    build: .
    ports:
      - "8000:8000"
    environment:
      HVA_CORS_ORIGINS: "*"
      HVA_FACT_STORE: "${HVA_FACT_STORE:-memory}"
      HVA_MEMORY_STORE: "${HVA_MEMORY_STORE:-memory}"
      HVA_MEMORY_SQLITE_PATH: "${HVA_MEMORY_SQLITE_PATH:-/app/data/memory/hva-memory.sqlite3}"
      HVA_NEO4J_URI: "${HVA_NEO4J_URI:-neo4j://neo4j:7687}"
      HVA_NEO4J_USER: "${HVA_NEO4J_USER:-neo4j}"
      HVA_NEO4J_PASSWORD: "${HVA_NEO4J_PASSWORD:-change-this-password}"
    volumes:
      - ./src:/app/src:ro
      - hva-memory:/app/data/memory
    command: uvicorn hva_engine.api:app --host 0.0.0.0 --port 8000 --reload

  neo4j:
    image: neo4j:5-community
    profiles: ["neo4j"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${HVA_NEO4J_PASSWORD:-change-this-password}"
    volumes:
      - neo4j-data:/data

volumes:
  neo4j-data:
  hva-memory:
